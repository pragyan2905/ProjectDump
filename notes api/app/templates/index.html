<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App with Auth</title>
    <style>
        /* Modern, minimal styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1, h2 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        button.secondary { background-color: #7f8c8d; }
        button:hover { background-color: #2980b9; }
        button.secondary:hover { background-color: #95a5a6; }
        .note { border-bottom: 1px solid #eee; padding: 15px 0; }
        .note:last-child { border-bottom: none; }
        .note-header { display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #e74c3c; padding: 5px 10px; font-size: 14px; width: auto;}
        .delete-btn:hover { background-color: #c0392b; }
        .date { font-size: 0.8em; color: #7f8c8d; }
        #auth-section, #notes-section { display: none; }
        .auth-switch { text-align: center; margin-top: 15px; cursor: pointer; color: #3498db; text-decoration: underline; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background-color: #e74c3c; width: auto; margin: 0; }
    </style>
</head>
<body>

    <h1>📝 My Notes App</h1>

    <!-- AUTHENTICATION SECTION -->
    <div id="auth-section">
        <div class="card" id="login-card">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button onclick="login()">Login</button>
            <div class="auth-switch" onclick="toggleAuthMode()">Need an account? Register here.</div>
        </div>

        <div class="card" id="register-card" style="display: none;">
            <h2>Register</h2>
            <input type="email" id="register-email" placeholder="Email" required>
            <input type="password" id="register-password" placeholder="Password" required>
            <button onclick="register()">Register</button>
            <div class="auth-switch" onclick="toggleAuthMode()">Already have an account? Login here.</div>
        </div>
    </div>

    <!-- NOTES SECTION -->
    <div id="notes-section">
        <div class="nav-header">
            <h3 id="user-greeting">Welcome!</h3>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <h3>Create a New Note</h3>
            <input type="text" id="title" placeholder="Note Title" required>
            <textarea id="content" rows="4" placeholder="Note Content..."></textarea>
            <button onclick="createNote()">Save Note</button>
        </div>

        <div class="card" id="notes-container">
            <p>Loading notes...</p>
        </div>
    </div>

    <script>
        const AUTH_API = '/api/auth/';
        const NOTES_API = '/api/notes/';
        let token = localStorage.getItem('token');
        let userEmail = localStorage.getItem('userEmail');

        // Check auth status on load
        window.onload = () => {
            if (token) {
                showNotes();
            } else {
                showAuth();
            }
        };

        // --- UI Flow ---
        function showAuth() {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('notes-section').style.display = 'none';
        }

        function showNotes() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('notes-section').style.display = 'block';
            document.getElementById('user-greeting').innerText = `Logged in as: ${userEmail}`;
            fetchNotes();
        }

        function toggleAuthMode() {
            const loginCard = document.getElementById('login-card');
            const registerCard = document.getElementById('register-card');
            if (loginCard.style.display === 'none') {
                loginCard.style.display = 'block';
                registerCard.style.display = 'none';
            } else {
                loginCard.style.display = 'none';
                registerCard.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            token = null;
            userEmail = null;
            showAuth();
        }

        // --- Auth API ---
        async function register() {
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value.trim();
            if (!email || !password) return alert("Email and password required!");

            try {
                const response = await fetch(`${AUTH_API}register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    alert("Registration successful! Please login.");
                    toggleAuthMode();
                } else {
                    const error = await response.json();
                    alert(error.detail || "Registration failed.");
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!email || !password) return alert("Email and password required!");

            // OAuth2PasswordRequestForm expects form-urlencoded data
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const response = await fetch(`${AUTH_API}login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    token = data.access_token;
                    userEmail = email;
                    localStorage.setItem('token', token);
                    localStorage.setItem('userEmail', userEmail);
                    showNotes();
                } else {
                    alert("Invalid credentials.");
                }
            } catch (error) {
                console.error(error);
            }
        }

        // --- Notes API ---
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        async function fetchNotes() {
            try {
                const response = await fetch(NOTES_API, { headers: getHeaders() });
                
                if (response.status === 401) {
                    return logout(); // Token expired or invalid
                }

                const notes = await response.json();
                const container = document.getElementById('notes-container');
                
                if (notes.length === 0) {
                    container.innerHTML = '<p>No notes yet. Create one above!</p>';
                    return;
                }

                container.innerHTML = '';
                notes.forEach(note => {
                    const date = new Date(note.created_at).toLocaleString();
                    const noteEl = document.createElement('div');
                    noteEl.className = 'note';
                    noteEl.innerHTML = `
                        <div class="note-header">
                            <h4>${note.title}</h4>
                            <button class="delete-btn" onclick="deleteNote(${note.id})">Delete</button>
                        </div>
                        <p>${note.content || '<em>No content</em>'}</p>
                        <span class="date">Created: ${date}</span>
                    `;
                    container.appendChild(noteEl);
                });
            } catch (error) {
                console.error(error);
            }
        }

        async function createNote() {
            const titleInput = document.getElementById('title');
            const contentInput = document.getElementById('content');
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title) return alert("Title is required!");

            try {
                const response = await fetch(NOTES_API, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ title, content })
                });

                if (response.ok) {
                    titleInput.value = '';
                    contentInput.value = '';
                    fetchNotes();
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function deleteNote(id) {
            if (!confirm("Are you sure you want to delete this note?")) return;

            try {
                const response = await fetch(`${NOTES_API}${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });

                if (response.ok) {
                    fetchNotes();
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>
</html>
